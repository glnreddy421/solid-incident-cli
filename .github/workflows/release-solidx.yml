name: release-solidx

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0). Optional when run from tag."
        required: false
        type: string

jobs:
  build-release-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Create release bundle
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          rm -rf out release-assets
          mkdir -p out/solidx release-assets

          cp -r dist out/solidx/dist
          cp package.json out/solidx/package.json
          cp LICENSE out/solidx/LICENSE
          cp README.md out/solidx/README.md

          cat > out/solidx/solidx <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          exec node "$SCRIPT_DIR/dist/index.js" "$@"
          EOF
          chmod +x out/solidx/solidx

          for TARGET in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            tar -czf "release-assets/solidx-v${VERSION}-${TARGET}.tar.gz" -C out/solidx .
          done

      - name: Compute checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          shasum -a 256 solidx-v${{ steps.version.outputs.version }}-*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solidx-release-assets-v${{ steps.version.outputs.version }}
          path: release-assets/*

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/solidx-v${{ steps.version.outputs.version }}-darwin-arm64.tar.gz
            release-assets/solidx-v${{ steps.version.outputs.version }}-darwin-x64.tar.gz
            release-assets/solidx-v${{ steps.version.outputs.version }}-linux-arm64.tar.gz
            release-assets/solidx-v${{ steps.version.outputs.version }}-linux-x64.tar.gz
            release-assets/checksums.txt
          generate_release_notes: true

      - name: Print formula helper
        shell: bash
        run: |
          echo "Use checksums.txt values with scripts/homebrew/render-formula.sh"
          cat release-assets/checksums.txt

